services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: cors-app:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_ENV: production
      APP_DEBUG: 'false'
      DB_CONNECTION: mysql
      DB_HOST: mysql_db
      DB_PORT: 3306
      SESSION_DRIVER: database
      CACHE_STORE: database
      QUEUE_CONNECTION: database
    ports:
      - '${APP_PORT:-8000}:8000'
    volumes:
      - app-storage:/var/www/html/storage
    networks:
      - default
      - database_default

  queue:
    image: cors-app:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_ENV: production
      APP_DEBUG: 'false'
      DB_CONNECTION: mysql
      DB_HOST: mysql_db
      DB_PORT: 3306
      SESSION_DRIVER: database
      CACHE_STORE: database
      QUEUE_CONNECTION: database
    command: php artisan queue:work --sleep=3 --tries=3 --timeout=90
    volumes:
      - app-storage:/var/www/html/storage
    networks:
      - default
      - database_default

  scheduler:
    image: cors-app:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_ENV: production
      APP_DEBUG: 'false'
      DB_CONNECTION: mysql
      DB_HOST: mysql_db
      DB_PORT: 3306
      SESSION_DRIVER: database
      CACHE_STORE: database
      QUEUE_CONNECTION: database
    command: php artisan schedule:work
    volumes:
      - app-storage:/var/www/html/storage
    networks:
      - default
      - database_default

networks:
  database_default:
    external: true

volumes:
  app-storage:
